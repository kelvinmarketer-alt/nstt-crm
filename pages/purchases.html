<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phiếu nhập · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .pn-table{width:100%;border-collapse:collapse;font-size:13px}
  .pn-table th{text-align:left;padding:10px 12px;background:#FAFBFC;font-size:11.5px;color:var(--muted);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--line)}
  .pn-table td{padding:10px 12px;border-bottom:1px solid #F1F5F9}
  .st-ordered{background:#FEF3C7;color:#92400E}
  .st-received{background:#DCFCE7;color:#15803D}
  .st-cancelled{background:#FEE2E2;color:#B91C1C}
  .st-pill{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
  .item-row{display:grid;grid-template-columns:2fr 70px 90px 110px 28px;gap:6px;margin-bottom:5px;align-items:center}
  .item-row input,.item-row select{border:1px solid var(--line);border-radius:5px;padding:5px 7px;font-size:12px;width:100%}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div><div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div>
        <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">📦 Phiếu nhập <span id="hbT"></span></h1>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Ghi nhận lấy hàng từ NCC — tự cộng kho — tạo công nợ NCC</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="window.exportPurCsv()">⬇ Xuất CSV</button>
      <button class="btn btn-ghost" style="border-color:#FDE68A;background:#FFFBEB;color:#92400E" onclick="window.openPurModal('EXT-MARKET')" title="Nhập phiếu thu mua chợ/vãng lai kèm giá thật → vào sổ quỹ kế toán">🛒 Thu mua ngoài</button>
      <button class="btn btn-primary" onclick="window.openPurModal()">+ Tạo phiếu nhập</button>
    </div>

    <div id="hbHost"></div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px" id="purKpis"></div>

    <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <input id="purQ" placeholder="🔍 Tìm mã phiếu, NCC..." style="flex:1;min-width:240px;border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
      <select id="purSt" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
        <option value="">Tất cả trạng thái</option>
        <option value="ordered">⏳ Đã đặt</option>
        <option value="received">✓ Đã nhận</option>
        <option value="cancelled">✕ Hủy</option>
      </select>
      <select id="purSup" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px"><option value="">Tất cả NCC</option></select>
    </div>

    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="pn-table">
          <thead><tr>
            <th style="width:32px"><div id="purSelectAll" class="checkbox" onclick="this.classList.toggle('on')" title="Chọn tất cả"></div></th>
            <th>Mã phiếu</th><th>NCC</th><th>Ngày nhập</th><th>Mặt hàng</th>
            <th class="num">Tổng tiền</th><th class="num">Đã trả</th><th class="num">Còn nợ</th>
            <th>Trạng thái</th><th>Hành động</th>
          </tr></thead>
          <tbody id="purBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div id="drawerContent" style="padding:0"></div></aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/products.js"></script>

<script src="../data/suppliers.js"></script>
<script src="../data/purchases.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../scripts/bulk-import.js"></script>
<script src="../scripts/purchases.js"></script>
<script src="../scripts/ai-fill.js"></script>
<script src="../scripts/cust-search-box.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body>
</html>
