<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phiếu nhập hàng · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .pn-table{width:100%;border-collapse:collapse;font-size:13px}
  .pn-table th{text-align:left;padding:10px 12px;background:#FAFBFC;font-size:11.5px;color:var(--muted);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--line)}
  .pn-table td{padding:10px 12px;border-bottom:1px solid #F1F5F9}
  .st-ordered{background:#FEF3C7;color:#92400E}
  .st-received{background:#DCFCE7;color:#15803D}
  .st-cancelled{background:#FEE2E2;color:#B91C1C}
  .st-pill{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
  .item-row{display:grid;grid-template-columns:2fr 70px 90px 110px 28px;gap:6px;margin-bottom:5px;align-items:center}
  .item-row input,.item-row select{border:1px solid var(--line);border-radius:5px;padding:5px 7px;font-size:12px;width:100%}
  /* Tab NCC ⇄ Thu mua ngoài */
  .pn-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .pn-tab{border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px}
  .pn-tab .cnt{font-size:11px;font-weight:800;background:#F1F5F9;color:var(--muted);border-radius:99px;padding:1px 8px}
  .pn-tab.on{color:#fff;border-color:transparent}
  .pn-tab.on.ncc{background:var(--navy)}
  .pn-tab.on.ext{background:#B45309}
  .pn-tab.on .cnt{background:rgba(255,255,255,.28);color:#fff}
  /* Accordion gom theo ngày */
  .pn-day{background:#F8FAFC;cursor:pointer}
  .pn-day:hover{background:#F1F5F9}
  .pn-day td{padding:11px 12px!important;border-top:2px solid var(--line);border-bottom:1px solid var(--line)!important;font-weight:700;color:var(--navy)}
  .pn-day .cr{display:inline-block;width:14px;transition:transform .15s;color:var(--muted)}
  .pn-day.open .cr{transform:rotate(90deg)}
  .pn-day .d-meta{font-weight:600;color:var(--muted);font-size:11.5px}
  .pn-day .d-sum{font-weight:800;color:var(--red)}
  tr.pn-item{display:none}
  tr.pn-item.show{display:table-row}
  @media (max-width:560px){
    .pn-day{display:block;border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:11px 13px}
    .pn-day td{display:block;border:none!important;padding:0!important}
    .pn-day > td > div{flex-wrap:wrap}
    .pn-day > td > div > span[style*="flex:1"]{display:none}   /* bỏ spacer để tổng xuống dòng gọn */
    .pn-day .d-meta{font-size:11px}
    .pn-day .d-sum{flex-basis:100%;text-align:right;font-size:15px;margin-top:4px}
    .pn-tab{flex:1;justify-content:center}
  }
  .pur-btn-create-m{display:none}   /* nút Tạo phiếu bản mobile — chỉ hiện ≤560 */
  /* MOBILE ≤560: mỗi phiếu nhập = 1 THẺ (mã phiếu/NCC + tổng tiền góc phải + ngày/trạng thái) */
  @media (max-width:560px){
    .pn-table thead{display:none}
    .pn-table, .pn-table tbody{display:block;width:100%;min-width:0!important}
    .pn-table tbody tr{display:block;position:relative;border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:11px 13px;background:#fff;cursor:pointer}
    .pn-table tbody td{display:block;border:none!important;padding:0;white-space:normal;font-size:12.5px;line-height:1.45;text-align:left!important}
    .pn-table tbody td[data-field="code"]{font-size:14px;font-weight:700;color:var(--navy);padding-right:96px}
    .pn-table tbody td[data-field="total"]{position:absolute!important;top:11px;right:13px;width:auto;text-align:right!important;font-weight:800;color:var(--red);font-size:15px}
    .pn-table tbody td[data-field="total"] b{font-weight:800}
    .pn-table tbody td[data-field="sup"]{display:block!important;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)!important;color:var(--text)}
    .pn-table tbody td[data-field="sup"]::before{content:"🏭 "}
    .pn-table tbody td[data-field="date"]{display:block!important;margin-top:3px;color:var(--muted)}
    .pn-table tbody td[data-field="date"]::before{content:"📅 "}
    .pn-table tbody td[data-field="status"]{display:block!important;margin-top:5px}
  }
  /* MOBILE ≤560: tinh gọn header + KPI Phiếu nhập */
  @media (max-width:560px){
    /* header: tiêu đề KHÔNG wrap; mô tả nằm full-width 1 dòng ngang dưới tiêu đề (không dồn ô hẹp) */
    .pn-pagehd{flex-wrap:wrap}
    .pn-pagehd-txt{flex:0 0 100%;width:100%;min-width:0}
    .pn-pagehd-txt h1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:18px}
    .pn-pagehd-sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pn-pagehd-spacer{display:none}
    .pur-btn-csv{display:none!important}                          /* ẩn Xuất CSV */
    .help-banner{display:none!important}                          /* ẩn banner "Phiếu nhập làm gì?" */
    #purKpis{grid-template-columns:1fr 1fr!important;gap:8px!important}   /* 4 ô KPI: 2/hàng */
    #purKpis > div{padding:10px 11px!important}
    #purKpis > div > div:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px!important}
    #purKpis > div > div:nth-child(2){font-size:18px!important;white-space:nowrap}
    #purKpis > div > div:nth-child(3){white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10.5px!important}
    /* nội dung phiếu nhập full chiều ngang — không cuộn ngang */
    .pn-table{min-width:0!important}
    /* nút "+ Tạo phiếu" bản desktop (ở header) ẩn — đã chuyển xuống hàng tìm kiếm */
    .pn-pagehd .pur-btn-create{display:none!important}
    /* hàng 1: [+ Tạo phiếu nhập] (co lại) + [🔍 ô tìm] (flex:1) cùng 1 dòng */
    .pur-filter-row{display:grid!important;grid-template-columns:auto 1fr;gap:8px!important;align-items:center}
    .pur-filter-row .pur-btn-create-m{grid-column:1;white-space:nowrap;padding:9px 12px!important;font-size:13px}
    .pur-filter-row #purQ{grid-column:2;min-width:0!important;width:100%}
    /* hàng 2: 2 select trạng thái + NCC chia đôi 50/50 */
    .pur-filter-row #purSt{grid-column:1;min-width:0!important;width:100%}
    .pur-filter-row #purSup{grid-column:2;min-width:0!important;width:100%}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div><div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div class="pn-pagehd" style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="pn-pagehd-txt">
        <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">📦 Phiếu nhập hàng <span id="hbT"></span></h1>
        <div class="pn-pagehd-sub" style="font-size:13px;color:var(--muted);margin-top:2px">Ghi nhận lấy hàng từ NCC — tự cộng kho — tạo công nợ NCC</div>
      </div>
      <div class="pn-pagehd-spacer" style="flex:1"></div>
      <button class="btn btn-ghost pur-btn-csv" onclick="window.exportPurCsv()">⬇ Xuất CSV</button>
      <button class="btn btn-ghost" style="border-color:#FDE68A;background:#FFFBEB;color:#92400E" onclick="window.openPurModal('EXT-MARKET')" title="Nhập phiếu thu mua chợ/vãng lai kèm giá thật → vào sổ quỹ kế toán">🛒 Thu mua ngoài</button>
      <button class="btn btn-primary pur-btn-create" onclick="window.openPurModal()">+ Tạo phiếu nhập</button>
    </div>

    <div id="hbHost"></div>

    <div class="pn-tabs" id="purTabs">
      <div class="pn-tab ncc on" data-tab="ncc" onclick="window.purSetTab('ncc')">🏭 Nhập từ NCC <span class="cnt" id="cntNcc">0</span></div>
      <div class="pn-tab ext" data-tab="ext" onclick="window.purSetTab('ext')">🛒 Thu mua ngoài <span class="cnt" id="cntExt">0</span></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px" id="purKpis"></div>

    <div class="pur-filter-row" style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn btn-primary pur-btn-create-m" onclick="window.openPurModal()">+ Tạo phiếu nhập</button>
      <input id="purQ" placeholder="🔍 Tìm nhà cung cấp, sản phẩm..." style="flex:1;min-width:240px;border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
      <select id="purSt" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
        <option value="">Tất cả trạng thái</option>
        <option value="ordered">⏳ Đã đặt</option>
        <option value="received">✓ Đã nhận</option>
        <option value="cancelled">✕ Hủy</option>
      </select>
      <select id="purSup" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px"><option value="">Tất cả NCC</option></select>
    </div>

    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="pn-table">
          <thead><tr>
            <th class="hide-xs" style="width:32px"><div id="purSelectAll" class="checkbox" onclick="this.classList.toggle('on')" title="Chọn tất cả"></div></th>
            <th>Nhà cung cấp</th><th>Mã phiếu</th><th class="hide-xs">Mặt hàng</th>
            <th class="num">Tổng tiền</th><th class="num hide-xs">Đã trả</th><th class="num hide-xs">Còn nợ</th>
            <th>Trạng thái</th><th class="hide-xs">Hành động</th>
          </tr></thead>
          <tbody id="purBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div id="drawerContent" style="padding:0"></div></aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/products.js"></script>

<script src="../data/suppliers.js"></script>
<script src="../data/purchases.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../scripts/bulk-import.js"></script>
<script src="../scripts/purchases.js"></script>
<script src="../scripts/ai-fill.js"></script>
<script src="../scripts/cust-search-box.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body>
</html>
