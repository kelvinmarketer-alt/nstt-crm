<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Công nợ NCC · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .ncd-tbl{width:100%;border-collapse:collapse;font-size:13px}
  .ncd-tbl th{text-align:left;padding:10px 12px;background:#FAFBFC;font-size:11.5px;color:var(--muted);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
  .ncd-tbl td{padding:10px 12px;border-bottom:1px solid #F1F5F9}
  .ncd-tbl tbody tr:hover{background:#FAFBFC}
  .num{text-align:right}
  @media (max-width:560px){ .hide-xs{display:none} }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div><div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div style="margin-bottom:12px">
      <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">🏭 Công nợ phải trả — Nhà cung cấp</h1>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">Tiền còn nợ từng NCC (phiếu nhập điều khoản NỢ đã nhận, chưa thanh toán)</div>
    </div>

    <div id="ncdSummary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px"></div>

    <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <input id="ncdSearch" type="search" placeholder="🔎 Tìm NCC theo tên / SĐT…" oninput="window.ncdRender()" style="flex:1;min-width:220px;border:1px solid var(--line);border-radius:7px;padding:8px 11px;font-size:13px">
      <select id="ncdType" onchange="window.ncdRender()" style="border:1px solid var(--line);border-radius:7px;padding:8px 11px;font-size:13px">
        <option value="">Tất cả loại</option>
        <option value="si">📦 Sỉ</option>
        <option value="le">🛵 Lẻ</option>
      </select>
    </div>

    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden">
      <div style="overflow-x:auto"><div id="ncdTable"></div></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../scripts/help-tips.js"></script>
<script src="../data/suppliers.js"></script>
<script src="../data/purchases.js"></script>
<script src="../scripts/ncc-cong-no.js"></script>
<script src="../scripts/system-core.js"></script>
</body>
</html>
