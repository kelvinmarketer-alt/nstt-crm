<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đơn định kỳ · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css"><link rel="stylesheet" href="../styles/app.css">
<style>
  .ro-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s}
  .ro-card:hover{border-color:var(--navy);box-shadow:0 2px 12px rgba(0,0,0,0.05)}
  .ro-card.paused{opacity:0.7;background:#FAFBFC}
  .ro-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
  .ro-av{width:42px;height:42px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:700}
  .ro-items{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .ro-item-pill{background:#F0FDF4;color:#15803D;padding:2px 8px;border-radius:99px;font-size:11.5px}
  .day-chip{display:inline-block;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;line-height:22px;text-align:center;margin-right:2px}
  .day-chip.on{background:#16A34A;color:#fff}
  .day-chip.off{background:#E5E7EB;color:#9CA3AF}
  /* ĐIỆN THOẠI (≤560): thẻ mẫu định kỳ 1 cột, vừa khít, ẩn phần thừa. Desktop giữ nguyên. */
  @media (max-width:560px){
    #roList{min-width:0}
    .ro-card{padding:11px 13px;margin-bottom:10px}
    .ro-card .ro-head{gap:9px}
    .ro-av{width:36px;height:36px;font-size:13px}
    /* khối "lần kế tiếp" bên phải: thu nhỏ, không đẩy vỡ layout */
    .ro-head > div:last-child{font-size:11px!important}
    /* KPI 4 ô → 2 ô/hàng cho gọn */
    #roKpis{grid-template-columns:repeat(2,1fr)!important}
    /* ô tìm + lọc xuống hàng, không cuộn ngang */
    #roQ{min-width:0!important}
    /* ẩn dòng inline đổi shipper (thao tác PC) — sửa ở drawer khi cần */
    .ro-ship-row.hide-xs{display:none!important}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div><div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div>
        <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">🔁 Đơn định kỳ <span id="hbT"></span></h1>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Mẫu đơn lặp lại theo ngày/tuần cho KH B2B — tự sinh đơn theo lịch</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="window.roRunNow()">▶ Chạy ngay (test)</button>
      <button class="btn btn-primary" onclick="window.openRoModal()">+ Tạo mẫu định kỳ</button>
    </div>
    <div id="hbHost"></div>

    <div id="roAutoCfg" style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="font-size:13px;font-weight:700;color:#15803D">🤖 Tự tạo đơn cho HÔM SAU</div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer">
        <input type="checkbox" id="auto_enabled" onchange="window.saveAutoCfg()" style="width:16px;height:16px"> Bật tự động
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:12.5px">⏰ Khung giờ:
        <input type="time" id="auto_time" value="21:00" onchange="window.saveAutoCfg()" style="border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:13px">
      </label>
      <span style="font-size:11.5px;color:var(--muted)">Mỗi ngày đúng giờ này, hệ thống tự tạo đơn ngày mai cho các mẫu đang chạy + báo Sale (Telegram). Khách báo dừng → bấm ⏸ Tạm dừng mẫu đó.</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px" id="roKpis"></div>

    <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <input id="roQ" placeholder="🔍 Tìm KH..." style="flex:1;min-width:240px;border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
      <select id="roSt" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
        <option value="">Tất cả</option><option value="active">Đang chạy</option><option value="paused">Tạm dừng</option>
      </select>
    </div>
    <div id="roList"></div>
  </main>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div id="drawerContent" style="padding:0"></div></aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script><script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script><script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/products.js"></script>
<script src="../data/customers.js"></script>
<script src="../data/recurring_orders.js"></script>
<script src="../data/fleet.js"></script>
<script src="../data/staff.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../scripts/bulk-import.js"></script>
<script src="../scripts/recurring.js"></script>
<script src="../scripts/ai-fill.js"></script><script src="../scripts/cust-preferences.js"></script>
<script src="../scripts/pdf-templates.js"></script>
<script src="../scripts/cust-search-box.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body></html>
