<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chấm công & Bảng lương · Nông Sản Tuấn Tú Hà Nội</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .rpt-tabs{display:flex;gap:0;background:#fff;border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:14px;width:fit-content;flex-wrap:wrap}
  .rpt-tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:7px;white-space:nowrap}
  .rpt-tab.active{background:var(--red);color:#fff}
  .attend-cell:hover{outline:2px solid var(--red);outline-offset:-2px;position:relative;z-index:1}
  #payMonth{padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer}
  /* ĐT (≤560): 2 nút CFO (navy + primary) cùng 1 hàng 50/50.
     Ghi đè rule app.css .head-actions .btn-navy/.btn-primary{flex:1 1 100%} bằng specificity bằng + load sau. */
  @media (max-width:560px){
    .head-actions{flex-wrap:wrap}
    .head-actions .cfo-act{flex:1 1 calc(50% - 4px);min-width:0}
    /* Tab "Chấm công" / "Bảng lương" → full-width chia đều */
    .rpt-tabs{width:100%!important;flex-wrap:nowrap}
    .rpt-tab{flex:1 1 0;min-width:0;text-align:center;padding:8px 6px;white-space:nowrap}
    /* FIX bảng chấm công: chỉ còn 2 cột (Tên + Công) → bảng full-width gọn, bỏ sticky/scrollbox/min-width thừa */
    .att-wrap{max-height:none!important;overflow:visible!important}
    table.att-table, table.att-table.t-responsive{width:100%!important;min-width:0!important}
    .att-table .att-staff{position:static!important;min-width:0!important;width:auto;font-size:13px}
    .att-table .att-stat.sum{width:84px;text-align:center;padding:8px 6px!important;font-size:15px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div>
    <div class="top-spacer"></div>
    <div class="search-global">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Tìm khách, đơn hàng, mã HĐ... (Ctrl + K)">
    </div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div class="page-head">
      <div>
        <h1>Chấm công &amp; Bảng lương</h1>
        <div class="sub">Theo dõi công hằng ngày + tính lương tháng. Upload Excel từ máy chấm công để cập nhật tự động.</div>
      </div>
      <div class="head-actions">
        <input type="month" id="payMonth" value="2026-05" onchange="window.setPayMonth(this.value)">
        <button class="btn btn-ghost" onclick="window.openLatePolicySettings && window.openLatePolicySettings()" title="Cấu hình mức phạt đi muộn (admin)">⚙ Khung phạt muộn</button>
        <button class="btn btn-ghost hide-xs" onclick="window.openAliasManager && window.openAliasManager()" title="Gán/sửa tên viết tắt máy chấm công">🔤 Tên viết tắt</button>
        <button class="btn btn-ghost hide-xs" onclick="window.openUploadTimesheet()">📥 Upload Excel chấm công</button>
        <button class="btn btn-navy cfo-act" onclick="window.submitAllDrafts && window.submitAllDrafts(document.getElementById('payMonth').value)" title="HR gửi tất cả phiếu draft + tự lập phiếu cho NV chưa có">📤 Gửi tất cả CFO duyệt</button>
        <button class="btn btn-primary cfo-act" onclick="window.openPayslipBatchReview && window.openPayslipBatchReview(document.getElementById('payMonth').value)" title="CFO xem hàng loạt + duyệt nhanh">📊 Bảng dự kiến CFO duyệt</button>
      </div>
    </div>

    <div class="rpt-tabs" id="payTabs"></div>
    <div id="payView"></div>
  </main>

  <!-- Drawer container for "Phiếu duyệt lương" -->
  <div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer">
    <div id="drawerContent"></div>
  </aside>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/staff.js"></script>
<script src="../data/timesheet.js"></script>
<script src="../scripts/payroll-formula.js"></script>
<script src="../scripts/payroll-approval.js"></script>
<script src="../scripts/payroll.js"></script>
<script src="../scripts/ai-fill.js"></script>
<script src="../scripts/cust-search-box.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body>
</html>
