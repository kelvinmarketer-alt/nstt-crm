<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sản phẩm & Bảng giá · Nông Sản Tuấn Tú Hà Nội</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .pv-tabs{display:flex;gap:0;background:#fff;border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:14px;width:fit-content;flex-wrap:wrap}
  .pv-tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:7px;white-space:nowrap}
  .pv-tab.active{background:var(--red);color:#fff}
  .pv-tab .t-short{display:none}  /* desktop dùng nhãn đầy đủ */
  /* Dropdown chọn nhóm bảng giá — ẩn trên desktop (dùng hàng nút) */
  .tier-select{display:none;padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;font-weight:600;color:var(--navy)}

  /* ===== MOBILE (≤560px): bảng giá → THẺ; lưới danh mục → 1 cột ===== */
  @media (max-width:560px){
    /* Header: ẩn nút Excel; 2 nút "Từ ảnh AI" + "Thêm sản phẩm" CÙNG 1 HÀNG (50/50) */
    .page-head .head-actions{display:flex;flex-wrap:wrap;gap:8px;width:100%}
    .page-head .head-actions .btn{flex:1 1 calc(50% - 8px);min-width:0;white-space:nowrap}
    /* Banner Telegram: tiêu đề nhỏ gọn 1 dòng (mô tả đã ẩn) */
    .tg-title{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    /* Tab xem: co gọn để 3 tab vừa 1-2 hàng, KHÔNG để 1 tab xuống dòng giữa chữ */
    /* 3 tab chia đều 1 hàng, dùng nhãn NGẮN để không xuống 2 dòng */
    .pv-tabs{width:100%;gap:4px;padding:3px;flex-wrap:nowrap}
    .pv-tab{flex:1 1 0;min-width:0;padding:7px 4px;font-size:12px;white-space:nowrap;text-align:center;overflow:hidden;text-overflow:ellipsis}
    .pv-tab .t-full{display:none}
    .pv-tab .t-short{display:inline}
    /* Nhóm bảng giá: hàng nút → dropdown + nút Quản lý CÙNG 1 HÀNG (dropdown ~68%, nút ~30%) */
    .tier-btns{display:none!important}
    /* label xuống dòng riêng → dropdown + Quản lý nhóm chung 1 hàng */
    .tier-label{flex:1 1 100%}
    .tier-select{display:block;flex:1 1 64%;width:auto;min-width:0}
    .tier-manage{flex:1 1 32%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    /* Toolbar bảng giá: bỏ spacer; hàng 1 = AI + Sao chép (50/50); hàng 2 = So sánh + PDF + Lưu (~33%) */
    .board-toolbar{gap:7px!important}
    .board-toolbar .bt-date{flex:1 1 100%}
    .board-toolbar .bt-date input{width:100%}
    .board-toolbar .bt-spacer{display:none!important}
    .board-toolbar .btn{font-size:11.5px;padding:7px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    /* Nhóm AI + Sao chép giá hôm qua: 50% mỗi nút (1 hàng) */
    .board-toolbar .bt-g1{flex:1 1 calc(50% - 4px)}
    /* Nhóm So sánh + Xuất PDF + Lưu: ~33% mỗi nút (1 hàng) */
    .board-toolbar .bt-g2{flex:1 1 calc(33.333% - 5px)}
    /* --- Bảng giá hôm nay (#boardView) & Bảng giá Marketing (#mktView) → thẻ --- */
    #boardView .mini-table thead, #mktView .mini-table thead{display:none}
    #boardView .mini-table, #boardView .mini-table tbody,
    #mktView .mini-table, #mktView .mini-table tbody{display:block;width:100%;min-width:0!important}
    #boardView .mini-table tbody tr, #mktView .mini-table tbody tr{
      display:block;position:relative;border:1px solid var(--line);border-radius:12px;
      margin:0 0 10px;padding:11px 13px;background:#fff}
    #boardView .mini-table tbody td, #mktView .mini-table tbody td{
      display:block;border:none!important;padding:0;white-space:normal;
      font-size:12.5px;line-height:1.45;text-align:left!important}
    /* DÒNG ĐẦU: tên SP đậm, chừa chỗ ô giá góc phải */
    #boardView .mini-table tbody td[data-field="name"],
    #mktView .mini-table tbody td[data-field="name"]{
      font-size:14px;font-weight:700;color:var(--navy);padding-right:120px}
    /* Ô GIÁ chính (input giá bán / giá MKT): ghim góc trên phải */
    #boardView .mini-table tbody td[data-field="price"],
    #mktView .mini-table tbody td[data-field="price"]{
      position:absolute!important;top:9px;right:11px;width:auto;text-align:right!important}
    #boardView .mini-table tbody td[data-field="price"] input,
    #mktView .mini-table tbody td[data-field="price"] input{width:104px}
    /* Dòng phụ: nhóm + ĐVT + giá tham chiếu (hiện lại, căn trái, không cắt) */
    #boardView .mini-table tbody td[data-field="cat"],
    #mktView .mini-table tbody td[data-field="cat"]{
      display:block!important;margin-top:6px;padding-top:6px;
      border-top:1px dashed var(--line)!important;white-space:normal!important;overflow:visible!important}
    #boardView .mini-table tbody td[data-field="unit"],
    #mktView .mini-table tbody td[data-field="unit"]{
      display:inline-block!important;margin-top:4px;color:var(--muted);white-space:normal!important;overflow:visible!important}
    #boardView .mini-table tbody td[data-field="ref"],
    #mktView .mini-table tbody td[data-field="ref"]{
      display:inline-block!important;margin-top:4px;margin-left:8px;color:var(--muted);
      white-space:normal!important;overflow:visible!important}
    #boardView .mini-table tbody td[data-field="ref"]::before{content:"Tham chiếu: "}
    /* Ẩn ô thừa trên thẻ: checkbox chọn, cột thay đổi/chênh phụ */
    #boardView .mini-table tbody td.hide-xs, #mktView .mini-table tbody td.hide-xs{display:none!important}

    /* --- Danh mục sản phẩm: lưới 2 cột → 1 cột, vừa khít --- */
    #catalogGrid{grid-template-columns:1fr!important}
  }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar (auto-render bởi shared.js) -->
  <aside class="sidebar"></aside>

  <!-- Topbar -->
  <header class="topbar">
    <div class="breadcrumb"></div>
    <div class="top-spacer"></div>
    <div class="search-global">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Tìm khách, đơn hàng, mã HĐ... (Ctrl + K)">
    </div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn sử dụng" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <!-- Main -->
  <main class="main">

    <div class="page-head">
      <div>
        <h1>Sản phẩm & Bảng giá ngày</h1>
        <div class="sub">Giá nông sản cập nhật theo từng ngày · gửi bảng giá cho nhà hàng</div>
      </div>
      <div class="head-actions">
        <button class="btn btn-ghost hide-xs" onclick="window.prodImportExcel()" title="Import SP hàng loạt từ Excel">📥 Excel</button>
        <button class="btn btn-ghost" onclick="window.prodImportAI()" title="Đọc ảnh AI: catalog / bảng giá để thêm SP">📷 Từ ảnh AI</button>
        <button class="btn btn-primary" onclick="window.openAddProduct()">+ Thêm sản phẩm</button>
      </div>
    </div>

    <div class="pv-tabs">
      <div class="pv-tab active" onclick="window.switchPView(event,'board')">📋 <span class="t-full">Bảng giá</span><span class="t-short">Bảng giá</span></div>
      <div class="pv-tab" onclick="window.switchPView(event,'mkt')">📣 <span class="t-full">Bảng giá Marketing</span><span class="t-short">Marketing</span></div>
      <div class="pv-tab" onclick="window.switchPView(event,'catalog')">🥬 <span class="t-full">Danh mục sản phẩm</span><span class="t-short">Danh mục</span></div>
    </div>

    <div id="boardView"></div>
    <div id="mktView" style="display:none"></div>
    <div id="catalogView" style="display:none"></div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/products.js"></script>

<script src="../data/brand-logo.js"></script>
<script src="../scripts/ai-fill.js"></script>
<script src="../scripts/price-catalogue.js"></script>
<script src="../scripts/price-auto-send.js"></script>
<script src="../scripts/products.js"></script>
<script src="../scripts/category-manager.js"></script>
<script src="../scripts/cust-search-box.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../scripts/bulk-import.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body>
</html>
