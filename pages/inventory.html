<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kho · Nông Sản Tuấn Tú Hà Nội</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .inv-table{width:100%;border-collapse:collapse;font-size:13px}
  .inv-table th{text-align:left;padding:10px 12px;background:#FAFBFC;font-size:11.5px;color:var(--muted);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--line)}
  .inv-table td{padding:10px 12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
  .stock-bar{display:inline-flex;align-items:center;gap:8px;min-width:140px}
  .stock-bar .bar{flex:1;height:8px;border-radius:4px;background:#E5E7EB;overflow:hidden;min-width:60px}
  .stock-bar .fill{height:100%;border-radius:4px;transition:width 0.3s}
  .stock-bar .pct{font-size:11px;color:var(--muted);min-width:34px;text-align:right}
  .lvl-ok{color:#16A34A;font-weight:700}
  .lvl-warn{color:#D97706;font-weight:700}
  .lvl-low{color:#DC2626;font-weight:700}
  .lvl-out{color:#7F1D1D;font-weight:700}
  .ik-kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .ik-kpi .lab{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.3px}
  .ik-kpi .val{font-size:24px;font-weight:800;color:var(--navy);margin-top:4px}
  .ik-kpi .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  /* Ô "Tình trạng" chỉ dùng cho thẻ mobile — ẩn trên desktop để giữ bảng nguyên */
  .inv-lvl-cell{display:none}
  /* Dropdown nút phụ — desktop ẩn (dùng nút phẳng), mobile hiện */
  .inv-acts-dd{position:relative;display:none}
  .inv-acts-dd>summary{list-style:none;cursor:pointer}
  .inv-acts-dd>summary::-webkit-details-marker{display:none}
  .inv-acts-dd-menu{position:absolute;right:0;top:calc(100% + 4px);z-index:30;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:6px;min-width:210px;display:flex;flex-direction:column;gap:4px}
  .inv-acts-dd-menu .btn{width:100%;justify-content:flex-start}
  /* ===== MOBILE: bảng tồn kho chính → THẺ (≤560px) ===== */
  @media (max-width:560px){
    /* HEADER: tiêu đề 1 dòng nhỏ gọn, ẩn nút phẳng → dùng dropdown ⋯, nút chính nổi bật */
    .inv-head{gap:8px;margin-bottom:10px}
    .inv-head .inv-h1{font-size:17px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .inv-head-sub{display:none}
    .inv-acts-flat{display:none}
    .inv-acts-dd{display:block;flex:0 0 auto}
    .inv-acts-dd>summary{padding:7px 11px}
    .inv-btn-main{flex:0 0 auto;padding:8px 12px;font-size:13px;white-space:nowrap}
    /* BANNER giới thiệu "Module Kho làm gì?" — ẩn hẳn trên ĐT (thừa) */
    .help-banner{display:none!important}
    /* KPI: 2 ô/hàng, nén lại */
    #invKpis{grid-template-columns:repeat(2,1fr)!important;gap:7px;margin-bottom:10px}
    #invKpis .ik-kpi{padding:8px 10px;border-radius:9px}
    #invKpis .ik-kpi .lab{font-size:9.5px;letter-spacing:0;line-height:1.3}
    #invKpis .ik-kpi .val{font-size:18px;margin-top:2px}
    #invKpis .ik-kpi .sub{font-size:10px;margin-top:1px}
    #invBody-host thead{display:none}
    #invBody-host table, #invBody-host tbody{display:block;width:100%;min-width:0!important}
    #invBody-host tbody tr{display:block;position:relative;border:1px solid var(--line);border-radius:12px;margin:0 0 10px;padding:11px 13px;background:#fff;cursor:pointer}
    #invBody-host tbody td{display:block;border:none!important;padding:0;white-space:normal;font-size:12.5px;line-height:1.45;text-align:left!important}
    #invBody-host tbody td[data-field="title"]{font-size:14px;font-weight:700;color:var(--navy);padding-right:104px}
    #invBody-host tbody td[data-field="stock"]{position:absolute!important;top:11px;right:13px;width:auto;text-align:right!important;font-weight:800;font-size:15px}
    #invBody-host tbody td[data-field="stock"] b{color:var(--navy)!important}
    #invBody-host tbody td[data-field="code"]{display:block!important;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)!important;color:var(--muted);white-space:normal!important;overflow:visible!important}
    #invBody-host tbody td[data-field="code"]::before{content:"🏷️ "}
    #invBody-host tbody td[data-field="level"]{display:block!important;margin-top:3px;white-space:normal!important;overflow:visible!important}
    /* Lịch sử biến động kho: BỎ khung cuộn cao cố định → full, dài thoải mái theo trang */
    #movList{max-height:none!important;overflow:visible!important}
    #movList-card{overflow:visible!important}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div>
    <div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div class="inv-head" style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="inv-head-titles">
        <h1 class="inv-h1" style="margin:0;font-size:22px;color:var(--navy);font-weight:800">📥 Kho / Tồn kho <span id="hbTitle"></span></h1>
        <div class="inv-head-sub" style="font-size:13px;color:var(--muted);margin-top:2px">Theo dõi tồn — cảnh báo hết — tự trừ khi xuất đơn</div>
      </div>
      <div style="flex:1"></div>
      <!-- Desktop: 2 nút phụ phẳng -->
      <span class="inv-acts-flat">
        <button class="btn btn-ghost" onclick="window.exportInvCsv()">⬇ Xuất Excel</button>
        <button class="btn btn-ghost" onclick="window.openInvAdjust()">⚖️ Kiểm kê / Điều chỉnh</button>
      </span>
      <!-- Mobile: gộp 2 nút phụ vào dropdown -->
      <details class="inv-acts-dd">
        <summary class="btn btn-ghost">⋯</summary>
        <div class="inv-acts-dd-menu">
          <button class="btn btn-ghost" onclick="this.closest('details').open=false;window.exportInvCsv()">⬇ Xuất Excel</button>
          <button class="btn btn-ghost" onclick="this.closest('details').open=false;window.openInvAdjust()">⚖️ Kiểm kê / Điều chỉnh</button>
        </div>
      </details>
      <button class="btn btn-primary inv-btn-main" onclick="window.location.href='purchases.html'">+ Tạo phiếu nhập</button>
    </div>

    <div id="hbHost"></div>

    <!-- KPI strip -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px" id="invKpis"></div>

    <!-- Filter -->
    <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <input id="invQ" placeholder="🔍 Tìm SP..." style="flex:1;min-width:200px;border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
      <select id="invFilter" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
        <option value="">Tất cả tình trạng</option>
        <option value="out">⛔ Hết hàng</option>
        <option value="low">🔴 Dưới ngưỡng (cần nhập)</option>
        <option value="warn">🟠 Sắp hết (< 1.5 lần ngưỡng)</option>
        <option value="ok">🟢 Đủ tồn</option>
      </select>
      <select id="invLoc" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
        <option value="">Tất cả kho</option>
      </select>
    </div>

    <div id="invBody-host" style="background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="inv-table">
          <thead><tr>
            <th class="hide-xs" style="width:32px"><div id="invSelectAll" class="checkbox" onclick="this.classList.toggle('on')" title="Chọn tất cả"></div></th>
            <th>Sản phẩm</th>
            <th>Mã SP</th>
            <th class="hide-xs">Kho</th>
            <th class="num">Tồn hiện tại</th>
            <th class="hide-xs">Mức tồn</th>
            <th class="num hide-xs">Trung bình bán/ngày</th>
            <th class="num hide-xs">Còn đủ bán</th>
            <th class="hide-xs">Nhập gần nhất</th>
            <th class="inv-lvl-cell">Tình trạng</th>
            <th class="hide-xs">Hành động</th>
          </tr></thead>
          <tbody id="invBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Movements -->
    <div id="movList-card" style="background:#fff;border:1px solid var(--line);border-radius:10px;margin-top:14px;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center">
        <h3 style="margin:0;font-size:13px;color:var(--navy);font-weight:700;text-transform:uppercase;letter-spacing:0.4px">📜 Lịch sử biến động kho (gần đây) <span id="hbMv"></span></h3>
      </div>
      <div id="movList" style="max-height:320px;overflow:auto"></div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/products.js"></script>
<script src="../data/inventory.js"></script>
<script src="../data/purchases.js"></script>
<script src="../data/suppliers.js"></script>
<script src="../scripts/inventory.js"></script>
<script src="../scripts/ai-fill.js"></script>
<script src="../scripts/cust-search-box.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body>
</html>
