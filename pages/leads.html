<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lead funnel · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css"><link rel="stylesheet" href="../styles/app.css">
<style>
  .funnel-col{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;min-height:300px}
  .funnel-head{font-size:12px;color:var(--muted);text-transform:uppercase;font-weight:700;padding:6px 8px 10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
  .lead-card{background:#FAFBFC;border:1px solid var(--line);border-radius:7px;padding:8px 10px;margin-top:8px;cursor:pointer;font-size:12.5px}
  .lead-card:hover{background:#fff;border-color:var(--navy)}
  .lead-card .n1{font-weight:700;color:var(--text);line-height:1.3}
  .lead-card .n2{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div><div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>
  <main class="main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div>
        <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">🎯 Lead funnel — KH tiềm năng <span id="hbT"></span></h1>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Theo dõi pipeline từ Lead → Customer</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="window.leadImportExcel()" title="Import nhiều Lead bằng Excel">📥 Excel</button>
      <button class="btn btn-ghost" onclick="window.leadImportAI()" title="Đọc ảnh AI để nhập Lead hàng loạt (vd ảnh chụp danh thiếp / list KH)">📷 Từ ảnh AI</button>
      <button class="btn btn-primary" onclick="window.openLeadModal()">+ Thêm Lead</button>
    </div>
    <div id="hbHost"></div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px" id="ldKpis"></div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px" id="funnel"></div>

    <h3 style="margin:24px 0 10px;font-size:13px;color:var(--navy);text-transform:uppercase;font-weight:700">📊 Conversion theo nguồn <span id="hbS"></span></h3>
    <div id="srcTable" style="background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script><script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script><script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/leads.js"></script>

<script>
(function(){
  window.renderAppShell('leads','Lead funnel');
  document.getElementById('hbHost').innerHTML = `<div style="background:linear-gradient(135deg,#EFF6FF 0%,#F0FDF4 100%);border:1px solid #BFDBFE;border-radius:10px;padding:14px 18px;margin-bottom:14px;line-height:1.6;font-size:13px">
    <h3 style="margin:0 0 8px;color:#1E40AF;font-size:14px;font-weight:800">🎯 Lead funnel — Mục đích · Ai điền · Hoạt động ra sao?</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:10px">
      <div>
        <div style="font-size:11px;color:#1E40AF;text-transform:uppercase;font-weight:700;letter-spacing:0.4px">📍 LÀ GÌ?</div>
        <div style="font-size:12px;color:#1F2937;margin-top:3px">KH <b>chưa từng phát sinh đơn</b> = <i>Lead</i> (tiềm năng). Khi chốt đơn đầu tiên → tự convert thành "Khách hàng" thật trong module Khách hàng.</div>
      </div>
      <div>
        <div style="font-size:11px;color:#1E40AF;text-transform:uppercase;font-weight:700;letter-spacing:0.4px">🎯 MỤC ĐÍCH</div>
        <div style="font-size:12px;color:#1F2937;margin-top:3px">Không để <b>rò rỉ KH tiềm năng</b>. Đo Conversion Rate từng giai đoạn để biết Marketing kéo Lead có chất, hay Sales không chốt được. Theo dõi Pipeline value để dự báo doanh thu.</div>
      </div>
      <div>
        <div style="font-size:11px;color:#1E40AF;text-transform:uppercase;font-weight:700;letter-spacing:0.4px">👤 AI ĐIỀN?</div>
        <div style="font-size:12px;color:#1F2937;margin-top:3px"><b>MKT</b>: nhập Lead từ FB Ads / Google Ads (campaign về). <b>Sale</b>: nhập Lead walk-in / referral / cold-call. Mỗi Lead có <b>owner</b> = NV được phân để theo dõi & chốt.</div>
      </div>
    </div>
    <div style="margin-top:12px;padding-top:10px;border-top:1px dashed #BFDBFE">
      <div style="font-size:11px;color:#1E40AF;text-transform:uppercase;font-weight:700;letter-spacing:0.4px;margin-bottom:6px">🔄 NGUYÊN LÝ 5 GIAI ĐOẠN:</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#1F2937;flex-wrap:wrap">
        <span style="background:#DBEAFE;color:#1E40AF;padding:3px 9px;border-radius:99px;font-weight:600">🆕 New</span><span style="color:#94A3B8">→</span>
        <span style="background:#FEF3C7;color:#92400E;padding:3px 9px;border-radius:99px;font-weight:600">📞 Contacted</span><span style="color:#94A3B8">→</span>
        <span style="background:#F3E8FF;color:#7C3AED;padding:3px 9px;border-radius:99px;font-weight:600">✅ Qualified</span><span style="color:#94A3B8">→</span>
        <span style="background:#DCFCE7;color:#15803D;padding:3px 9px;border-radius:99px;font-weight:600">🏆 Won</span><span style="color:#94A3B8">hoặc</span>
        <span style="background:#FEE2E2;color:#B91C1C;padding:3px 9px;border-radius:99px;font-weight:600">❌ Lost</span>
      </div>
      <div style="font-size:11.5px;color:#475569;margin-top:8px;line-height:1.65">
        <b>Quy trình thực tế:</b> ① MKT chạy Ads → có khách hỏi giá → tạo Lead (<b>New</b>) → ② Sale gọi tư vấn (<b>Contacted</b>) → ③ KH có nhu cầu + ngân sách + thẩm quyền quyết = <b>Qualified</b> → ④ Gửi báo giá → KH duyệt → chốt đơn đầu = <b>Won</b> · KH từ chối/lặn = <b>Lost</b>.
      </div>
      <div style="font-size:11.5px;color:#475569;margin-top:4px"><b>KPI quan trọng:</b> Conversion Rate Won/Total ≥ <b>20%</b> là tốt cho B2B nông sản. <b>Pipeline value</b> = ngân sách dự kiến nếu chốt hết Lead đang xử lý.</div>
    </div>
    <div style="margin-top:10px;padding:9px 13px;background:#FEF3C7;border-radius:7px;font-size:11.5px;color:#92400E;line-height:1.55">
      💡 <b>Liên kết tự động với app:</b> Khi Lead → Won → app nhắc tạo bản ghi KH chính thức. Nguồn Lead (fb/google) so chéo với Chi phí Ads để tính ROI từng kênh. Owner sẽ được cộng KPI doanh số khi Lead won → đơn đầu.
    </div>
  </div>`;
  document.getElementById('hbT').innerHTML = window.helpTip('Lead khác KH: Lead chưa từng phát sinh đơn. Khi chốt (won) → tự convert thành record trong Customers.', {size:'lg'});
  document.getElementById('hbS').innerHTML = window.helpTip('Xem nguồn nào hiệu quả nhất → tập trung Ads budget vào đó.');

  const STAGES = [
    {id:'new', label:'🆕 Mới', color:'#3B82F6', help:'Lead vừa lộ diện, chưa liên hệ.'},
    {id:'contacted', label:'📞 Đã liên hệ', color:'#A16207', help:'Đã gọi/Zalo, đang chờ phản hồi.'},
    {id:'qualified', label:'✅ Qualified', color:'#7C3AED', help:'Có nhu cầu rõ + ngân sách + thẩm quyền quyết.'},
    {id:'won', label:'🏆 Thành KH', color:'#16A34A', help:'Chốt đơn đầu tiên — convert sang Customers.'},
    {id:'lost', label:'❌ Mất', color:'#DC2626', help:'Không chốt được. Ghi lý do để rút kinh nghiệm.'},
  ];

  function getL() { return window.STORE.get('leads', window.LEADS || []) || []; }

  function renderKpis() {
    const list = getL();
    const tot = list.length;
    const won = list.filter(l => l.stage === 'won').length;
    const lost = list.filter(l => l.stage === 'lost').length;
    const active = tot - won - lost;
    const conv = tot ? Math.round(won/tot*100) : 0;
    const pipelineValue = list.filter(l => l.stage !== 'won' && l.stage !== 'lost').reduce((s,l) => s + (l.estValue||0), 0);
    document.getElementById('ldKpis').innerHTML = `
      <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700">Tổng Lead</div><div style="font-size:22px;font-weight:800;color:var(--navy)">${tot}</div></div>
      <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700">🔥 Đang xử lý ${window.helpTip('Lead chưa Won chưa Lost — cần theo dõi.')}</div><div style="font-size:22px;font-weight:800;color:#A16207">${active}</div></div>
      <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700">🏆 Đã chốt</div><div style="font-size:22px;font-weight:800;color:var(--ok)">${won}</div></div>
      <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700">💰 Pipeline value ${window.helpTip('Σ estValue của các Lead chưa Won/Lost. Doanh thu kỳ vọng nếu chốt hết.')}</div><div style="font-size:22px;font-weight:800;color:var(--navy)">${window.fmtShort(pipelineValue)}</div></div>
      <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700">🎯 Conversion ${window.helpTip('% Lead Won / Tổng Lead. Trung bình ngành B2B: 15-25%.')}</div><div style="font-size:22px;font-weight:800;color:${conv>=20?'var(--ok)':'#D97706'}">${conv}%</div></div>
    `;
  }

  function renderFunnel() {
    const list = getL();
    document.getElementById('funnel').innerHTML = STAGES.map(s => {
      const items = list.filter(l => l.stage === s.id);
      return `<div class="funnel-col">
        <div class="funnel-head" style="color:${s.color}">${s.label} <span>${items.length}</span></div>
        ${items.map(l => `<div class="lead-card" onclick="window.openLeadModal('${l.id}')">
          <div class="n1">${l.name}</div>
          <div class="n2">${l.contact} · ${l.phone}</div>
          <div style="margin-top:4px;display:flex;justify-content:space-between;font-size:11px">
            <span style="color:var(--muted)">${l.source}</span>
            <span style="color:var(--navy);font-weight:700">${window.fmtShort(l.estValue||0)}</span>
          </div>
        </div>`).join('') || `<div style="text-align:center;padding:30px 10px;color:var(--muted);font-size:11.5px;font-style:italic">${s.help}</div>`}
      </div>`;
    }).join('');
  }

  function renderSrc() {
    const list = getL();
    const srcMap = {};
    list.forEach(l => {
      srcMap[l.source] = srcMap[l.source] || {total:0, won:0, value:0};
      srcMap[l.source].total++;
      if (l.stage === 'won') srcMap[l.source].won++;
      srcMap[l.source].value += (l.estValue||0);
    });
    let html = `<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#FAFBFC">
      <th style="text-align:left;padding:10px;font-size:11px;color:var(--muted);text-transform:uppercase">Nguồn</th>
      <th style="text-align:right;padding:10px;font-size:11px;color:var(--muted);text-transform:uppercase">Tổng Lead</th>
      <th style="text-align:right;padding:10px;font-size:11px;color:var(--muted);text-transform:uppercase">Chốt được</th>
      <th style="text-align:right;padding:10px;font-size:11px;color:var(--muted);text-transform:uppercase">Conversion</th>
      <th style="text-align:right;padding:10px;font-size:11px;color:var(--muted);text-transform:uppercase">Pipeline value</th>
    </tr></thead><tbody>`;
    const SRC_LAB = {'fb-ads':'📘 Facebook Ads', 'google-ads':'🔍 Google Ads', 'referral':'🤝 Giới thiệu', 'walk-in':'🚶 Walk-in', 'cold-call':'📞 Cold call'};
    Object.keys(srcMap).sort((a,b) => srcMap[b].total - srcMap[a].total).forEach(s => {
      const v = srcMap[s];
      const cv = v.total ? Math.round(v.won/v.total*100) : 0;
      html += `<tr style="border-top:1px solid #F1F5F9">
        <td style="padding:10px"><b>${SRC_LAB[s]||s}</b></td>
        <td style="text-align:right;padding:10px">${v.total}</td>
        <td style="text-align:right;padding:10px;color:var(--ok);font-weight:700">${v.won}</td>
        <td style="text-align:right;padding:10px;color:${cv>=20?'var(--ok)':'#D97706'};font-weight:700">${cv}%</td>
        <td style="text-align:right;padding:10px">${window.fmt(v.value)} ₫</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('srcTable').innerHTML = html;
  }

  window.openLeadModal = function(id) {
    const isEdit = !!id;
    const l = isEdit ? getL().find(x => x.id === id) :
      {id:'LD'+String(getL().length+1).padStart(3,'0'), name:'', contact:'', phone:'', source:'fb-ads', stage:'new',
       interest:'rau-ta', estValue:0, owner:window.CURRENT_USER?.name||'', createdAt:'18/05/2026', lastTouch:'18/05/2026', note:''};
    window.openModal((isEdit?'✏️':'+')+' Lead', `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="grid-column:span 2"><label style="font-size:12px;color:var(--muted)">Tên Lead *</label><input id="ld_name" value="${l.name}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px"></div>
        <div><label style="font-size:12px;color:var(--muted)">Liên hệ</label><input id="ld_ct" value="${l.contact}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px"></div>
        <div><label style="font-size:12px;color:var(--muted)">SĐT</label><input id="ld_ph" value="${l.phone}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px"></div>
        <div><label style="font-size:12px;color:var(--muted)">Nguồn ${window.helpTip('Nguồn ra Lead. Theo dõi để biết Ads channel nào tốt nhất.')}</label>
          <select id="ld_src" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px">
            <option value="fb-ads" ${l.source==='fb-ads'?'selected':''}>📘 FB Ads</option>
            <option value="google-ads" ${l.source==='google-ads'?'selected':''}>🔍 Google Ads</option>
            <option value="referral" ${l.source==='referral'?'selected':''}>🤝 Giới thiệu</option>
            <option value="walk-in" ${l.source==='walk-in'?'selected':''}>🚶 Walk-in</option>
            <option value="cold-call" ${l.source==='cold-call'?'selected':''}>📞 Cold call</option>
          </select>
        </div>
        <div><label style="font-size:12px;color:var(--muted)">Giai đoạn</label>
          <select id="ld_st" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px">
            ${STAGES.map(s => `<option value="${s.id}" ${l.stage===s.id?'selected':''}>${s.label}</option>`).join('')}
          </select>
        </div>
        <div><label style="font-size:12px;color:var(--muted)">Est. value (₫/tháng)</label><input id="ld_val" type="number" value="${l.estValue}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px"></div>
        <div><label style="font-size:12px;color:var(--muted)">NV phụ trách</label><input id="ld_own" value="${l.owner}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px"></div>
        <div style="grid-column:span 2"><label style="font-size:12px;color:var(--muted)">Ghi chú</label><textarea id="ld_note" rows="3" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:7px">${l.note||''}</textarea></div>
      </div>
    `, {
      footer:`<button class="btn btn-ghost" onclick="window.closeModal()">Hủy</button>
              ${isEdit ? `<button class="btn btn-ghost" style="color:var(--danger)" onclick="window._ldDel('${l.id}')">🗑 Xoá</button>` : ''}
              <button class="btn btn-primary" onclick="window._ldSave('${l.id}',${isEdit})">Lưu</button>`,
      width:'520px'
    });
  };
  window._ldSave = function(id, isEdit){
    const obj = { id,
      name: document.getElementById('ld_name').value, contact: document.getElementById('ld_ct').value,
      phone: document.getElementById('ld_ph').value, source: document.getElementById('ld_src').value,
      stage: document.getElementById('ld_st').value, estValue: parseInt(document.getElementById('ld_val').value)||0,
      owner: document.getElementById('ld_own').value, note: document.getElementById('ld_note').value,
      lastTouch:'18/05/2026', createdAt: isEdit ? undefined : '18/05/2026',
    };
    if (!obj.name) { window.toast('Nhập tên','warn'); return; }
    const list = getL();
    if (isEdit) { const i = list.findIndex(x => x.id === id); list[i] = { ...list[i], ...obj }; }
    else list.push(obj);
    window.STORE.set('leads', list);
    window.audit && window.audit.log(isEdit?'lead.update':'lead.create', `${obj.name} · ${obj.stage}`);
    if (obj.stage === 'won' && !isEdit) {
      window.toast('🏆 Lead Won! Đừng quên tạo bản ghi KH chính thức.','success');
    } else window.toast('✓ Đã lưu','success');
    window.closeModal();
    renderAll();
  };
  window._ldDel = function(id){
    if (!confirm('Xoá Lead này?')) return;
    window.STORE.set('leads', getL().filter(x => x.id !== id));
    window.closeModal(); renderAll();
  };

  function renderAll(){ renderKpis(); renderFunnel(); renderSrc(); }
  window.STORE.subscribe('leads', renderAll);
  renderAll();

  /* ============ BULK IMPORT ============ */
  function _saveImported(records, src) {
    const list = getL();
    let added = 0;
    records.forEach((r, i) => {
      if (!r.name || !String(r.name).trim()) return;
      list.push({
        id: 'LD' + String(list.length + 1 + i).padStart(3, '0'),
        name: r.name, contact: r.contact || '', phone: r.phone || '',
        source: r.source || 'walk-in', stage: 'new',
        interest: r.interest || 'rau-ta', estValue: parseInt(r.estValue)||0,
        owner: r.owner || window.CURRENT_USER?.name || '',
        createdAt:'18/05/2026', lastTouch:'18/05/2026',
        note: r.note || ('Import từ ' + src),
      });
      added++;
    });
    window.STORE.set('leads', list);
    window.audit && window.audit.log('lead.bulkImport', `+${added} Lead từ ${src}`);
    window.toast(`✓ Đã thêm ${added} Lead từ ${src}`, 'success');
  }

  window.leadImportExcel = function() {
    window.BulkImport.fromExcel({
      entityName: 'Lead',
      templateColumns: ['name','contact','phone','source','interest','estValue','owner','note'],
      templateRow: ['Nhà hàng Mâm Cá Tiên','Anh Bình','0912345001','fb-ads','rau-ta','8000000','Tuấn Tú','Hỏi báo giá qua FB'],
      mapRow: (row, headers) => ({
        name: row[0], contact: row[1], phone: row[2],
        source: row[3] || 'walk-in', interest: row[4] || 'rau-ta',
        estValue: row[5] || 0, owner: row[6] || '', note: row[7] || '',
      }),
      onParsed: (recs) => _saveImported(recs, 'Excel'),
    });
  };
  window.leadImportAI = function() {
    window.BulkImport.fromImage({
      entityName: 'Lead',
      promptHint: 'list KH tiềm năng / danh thiếp / screenshot FB Ads leads',
      fields: ['name','contact','phone','source','interest','estValue','note'],
      aiTask: 'customer',
      onParsed: (recs) => _saveImported(recs, 'Ảnh AI'),
    });
  };
})();
</script>
<script src="../scripts/ai-fill.js"></script><script src="../scripts/cust-search-box.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../scripts/bulk-import.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body></html>
