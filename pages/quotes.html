<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Báo giá · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css"><link rel="stylesheet" href="../styles/app.css">
<style>
  .qt-table{width:100%;border-collapse:collapse;font-size:13px}
  .qt-table th{text-align:left;padding:10px 12px;background:#FAFBFC;font-size:11.5px;color:var(--muted);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--line)}
  .qt-table td{padding:10px 12px;border-bottom:1px solid #F1F5F9}
  .qst{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
  .qst-draft{background:#F1F5F9;color:#475569}
  .qst-sent{background:#DBEAFE;color:#1E40AF}
  .qst-accepted{background:#DCFCE7;color:#15803D}
  .qst-rejected{background:#FEE2E2;color:#B91C1C}
  .qst-expired{background:#FEF3C7;color:#92400E}
  /* Nhãn chữ trong nút hành động — chỉ hiện trên thẻ mobile */
  .qt-btn-lbl{display:none}

  /* ===== MOBILE ≤560px: mỗi báo giá = 1 THẺ (card), không kéo ngang ===== */
  @media (max-width:560px){
    /* Bẻ gãy force min-width:600px + overflow của ux-improvements.js */
    .qt-table{min-width:0!important;width:100%}
    /* Specificity cao hơn rule cùng tên của ux-improvements (được inject sau) */
    main div[style*="overflow-x:auto"]{overflow-x:hidden!important}

    .qt-table thead{display:none}
    .qt-table,.qt-table tbody{display:block;width:100%}
    .qt-table tbody tr{
      display:block;position:relative;
      border:1px solid var(--line);border-radius:12px;margin:0 0 10px;
      padding:11px 13px;background:#fff
    }
    .qt-table tbody td{
      display:block;border:none!important;padding:2px 0;
      text-align:left!important;white-space:normal;font-size:12.5px;line-height:1.45
    }
    /* Tên KH = tiêu đề thẻ (đậm), chừa chỗ cho ô tổng tiền ghim phải */
    .qt-table tbody td[data-field="cust"]{
      font-size:14.5px;font-weight:800;color:var(--navy);padding-right:104px;line-height:1.25
    }
    /* Mã BG: dòng phụ ngay dưới tên */
    .qt-table tbody td[data-field="id"]{margin-top:1px;color:var(--muted);font-size:11.5px}
    .qt-table tbody td[data-field="id"] b{font-weight:600}
    /* TỔNG TIỀN: ghim góc trên phải, navy đậm */
    .qt-table tbody td[data-field="total"]{
      position:absolute!important;top:11px;right:13px;width:auto;
      padding:0!important;text-align:right!important;
      font-weight:800;color:var(--navy);font-size:15px
    }
    /* Khối thông tin phụ: gạch ngang phía trên, mỗi dòng 1 icon/nhãn */
    .qt-table tbody td[data-field="status"]{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)!important}
    .qt-table tbody td[data-field="date"]::before{content:"📅 Ngày: "}
    .qt-table tbody td[data-field="valid"]::before{content:"⏳ Hết hạn: "}
    .qt-table tbody td[data-field="staff"]::before{content:"👤 NV: "}
    .qt-table tbody td[data-field="date"],
    .qt-table tbody td[data-field="valid"]{color:var(--muted);margin-top:3px}
    .qt-table tbody td[data-field="staff"]{margin-top:3px}
    /* HÀNH ĐỘNG: hàng nút full-width dưới cùng, chia đều */
    .qt-table tbody td[data-field="actions"]{
      margin-top:10px;display:flex!important;gap:10px;flex-wrap:wrap
    }
    .qt-table tbody td[data-field="actions"] .btn{
      flex:1 1 calc(50% - 10px);min-width:0;justify-content:center;white-space:nowrap
    }
    .qt-btn-lbl{display:inline}

    /* Bộ lọc: tìm kiếm + trạng thái xếp dọc cho thoáng */
    #qtQ{min-width:0!important}
    /* KPI 5 ô → lưới 2 cột cho dễ đọc trên ĐT */
    #qtKpis{grid-template-columns:repeat(2,1fr)!important}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div><div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div>
        <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">📝 Báo giá <span id="hbT"></span></h1>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Gửi báo giá → KH duyệt → 1 click convert thành đơn hàng</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="window.openQuoteModal()">+ Tạo báo giá</button>
    </div>
    <div id="hbHost"></div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px" id="qtKpis"></div>

    <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <input id="qtQ" placeholder="🔍 Tìm mã / KH..." style="flex:1;min-width:240px;border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
      <select id="qtSt" style="border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px">
        <option value="">Tất cả trạng thái</option>
        <option value="draft">📋 Nháp</option>
        <option value="sent">📤 Đã gửi</option>
        <option value="accepted">✓ Đã duyệt</option>
        <option value="rejected">✕ Từ chối</option>
        <option value="expired">⏰ Hết hạn</option>
      </select>
    </div>

    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="qt-table">
          <thead><tr>
            <th>Mã BG</th><th>KH</th><th>Ngày</th><th>Hết hạn</th>
            <th class="num">Tổng tiền</th><th>NV</th><th>Trạng thái</th><th>Hành động</th>
          </tr></thead>
          <tbody id="qtBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div id="drawerContent" style="padding:0"></div></aside>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script><script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script><script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../data/products.js"></script>
<script src="../data/customers.js"></script>
<script src="../data/quotes.js"></script>
<script src="../scripts/quotes.js"></script>
<script src="../scripts/ai-fill.js"></script><script src="../scripts/cust-preferences.js"></script>
<script src="../scripts/pdf-templates.js"></script>
<script src="../scripts/cust-search-box.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body></html>
