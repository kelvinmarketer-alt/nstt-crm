<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loyalty · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css"><link rel="stylesheet" href="../styles/app.css">
<style>
  .lo-rule{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .lo-rule.off{opacity:0.55}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div><div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>
  <main class="main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div>
        <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">🎁 Loyalty / Chiết khấu KH <span id="hbT"></span></h1>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Quy tắc giảm giá tự động — áp dụng khi tạo đơn</div>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="window.openLoRule()">+ Thêm rule</button>
    </div>
    <div id="hbHost"></div>

    <div id="loList"></div>

    <h3 style="margin:24px 0 10px;font-size:13px;color:var(--navy);text-transform:uppercase;font-weight:700">🧪 Test rule với 1 đơn giả <span id="hbT2"></span></h3>
    <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <label style="font-size:12px;color:var(--muted)">Tổng đơn (₫)</label>
        <input id="t_total" type="number" value="3000000" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px;margin-bottom:8px">
        <label style="font-size:12px;color:var(--muted)">Nhóm KH</label>
        <select id="t_grp" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px">
          <option>VIP</option><option>Thường</option><option>Mới</option>
        </select>
        <button class="btn btn-primary" onclick="window.testLoyalty()" style="margin-top:10px;width:100%">▶ Thử áp dụng</button>
      </div>
      <div id="t_out" style="background:#FAFBFC;padding:14px;border-radius:8px;font-size:13px;line-height:1.6">Kết quả test sẽ hiện ở đây</div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script><script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script><script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script src="../scripts/onboarding.js"></script>
<script src="../scripts/pdf-export.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../scripts/loyalty.js"></script>

<script>
(function(){
  window.renderAppShell('settings','Loyalty / Chiết khấu');
  document.getElementById('hbHost').innerHTML = window.helpBanner(
    '🎁 Loyalty engine làm gì?',
    'Đặt <b>quy tắc giảm giá</b> tự động theo: nhóm KH (VIP), giá trị đơn tối thiểu, nhóm SP. Khi tạo đơn hoặc tính đơn định kỳ, hệ thống <b>tự áp dụng</b> rule có điều kiện thỏa mãn, theo thứ tự ưu tiên. Giúp chốt deal KH lớn + giữ KH VIP.',
    {id:'hb-lo', icon:'🎁'}
  );
  document.getElementById('hbT').innerHTML = window.helpTip('Rule có priority thấp = ưu tiên áp trước. % giảm cộng dồn nếu nhiều rule cùng match.', {size:'lg'});
  document.getElementById('hbT2').innerHTML = window.helpTip('Nhập 1 đơn giả → xem các rule nào áp được + tổng giảm.');

  function render(){
    const rules = window.Loyalty.getRules();
    const host = document.getElementById('loList');
    host.innerHTML = rules.map(r => {
      const a = r.action;
      const desc = a.type==='percent' ? `Giảm ${a.value}%` : a.type==='amount' ? `Giảm ${window.fmt(a.value)} ₫` : 'Miễn phí vận chuyển';
      const cond = [];
      if (r.conditions.custGroup) cond.push('Nhóm KH: ' + r.conditions.custGroup.join(','));
      if (r.conditions.minTotal) cond.push('Đơn ≥ ' + window.fmt(r.conditions.minTotal) + ' ₫');
      if (r.conditions.category) cond.push('Nhóm SP: ' + r.conditions.category.join(','));
      return `<div class="lo-rule ${r.enabled?'':'off'}">
        <label class="toggle"><input type="checkbox" ${r.enabled?'checked':''} onchange="window.toggleLoRule('${r.id}')"><span class="slider"></span></label>
        <div style="flex:1">
          <div style="font-weight:700">${r.name}</div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:3px">${desc} · Điều kiện: ${cond.join(' AND ') || 'Mọi đơn'} · Priority ${r.priority}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="window.openLoRule('${r.id}')">✏️</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="window.delLoRule('${r.id}')">🗑</button>
      </div>`;
    }).join('') || '<div style="text-align:center;padding:30px;color:var(--muted)">Chưa có rule nào</div>';
  }

  window.toggleLoRule = function(id){
    const r = window.Loyalty.getRules();
    const i = r.findIndex(x => x.id === id); r[i].enabled = !r[i].enabled;
    window.Loyalty.setRules(r); render();
  };
  window.delLoRule = function(id){
    if (!confirm('Xoá rule này?')) return;
    window.Loyalty.setRules(window.Loyalty.getRules().filter(x => x.id !== id));
    render();
  };

  window.openLoRule = function(id){
    const isEdit = !!id;
    const r = isEdit ? window.Loyalty.getRules().find(x => x.id === id) :
      {id:'L'+String(window.Loyalty.getRules().length+1).padStart(2,'0'), name:'', enabled:true, priority:50,
       conditions:{}, action:{type:'percent', value:5}};
    window.openModal((isEdit?'✏️':'+')+' Rule giảm giá', `
      <label style="font-size:12px;color:var(--muted)">Tên rule</label>
      <input id="lr_name" value="${r.name}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px;margin-bottom:8px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-size:12px;color:var(--muted)">Loại giảm ${window.helpTip('% = giảm theo phần trăm tổng. ₫ = giảm 1 số tiền cố định. Freeship = miễn vận chuyển.')}</label>
          <select id="lr_type" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px">
            <option value="percent" ${r.action.type==='percent'?'selected':''}>% giảm</option>
            <option value="amount" ${r.action.type==='amount'?'selected':''}>₫ giảm</option>
            <option value="freeShip" ${r.action.type==='freeShip'?'selected':''}>Freeship</option>
          </select>
        </div>
        <div><label style="font-size:12px;color:var(--muted)">Giá trị</label>
          <input id="lr_value" type="number" value="${r.action.value}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px"></div>
      </div>
      <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
      <div style="font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px">Điều kiện áp dụng (AND)</div>
      <label style="font-size:12px;color:var(--muted)">Nhóm KH (để trống = mọi nhóm)</label>
      <input id="lr_grp" value="${(r.conditions.custGroup||[]).join(',')}" placeholder="VIP, Mới" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px;margin-bottom:8px">
      <label style="font-size:12px;color:var(--muted)">Đơn tối thiểu (₫)</label>
      <input id="lr_min" type="number" value="${r.conditions.minTotal||0}" placeholder="0" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px;margin-bottom:8px">
      <label style="font-size:12px;color:var(--muted)">Priority ${window.helpTip('Số thấp = ưu tiên áp trước. VD: 10 < 50.')}</label>
      <input id="lr_pri" type="number" value="${r.priority}" style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px">
    `, {
      footer:`<button class="btn btn-ghost" onclick="window.closeModal()">Hủy</button>
              <button class="btn btn-primary" onclick="window._lrSave('${r.id}',${isEdit})">Lưu</button>`,
      width:'460px'
    });
  };
  window._lrSave = function(id, isEdit){
    const obj = {
      id, name: document.getElementById('lr_name').value, enabled:true,
      priority: parseInt(document.getElementById('lr_pri').value) || 50,
      conditions: {},
      action: { type:document.getElementById('lr_type').value, value: parseInt(document.getElementById('lr_value').value) || 0 },
    };
    const grp = document.getElementById('lr_grp').value.trim();
    if (grp) obj.conditions.custGroup = grp.split(',').map(s => s.trim());
    const m = parseInt(document.getElementById('lr_min').value); if (m > 0) obj.conditions.minTotal = m;
    const list = window.Loyalty.getRules();
    if (isEdit) { const i = list.findIndex(x => x.id === id); list[i] = obj; }
    else list.push(obj);
    window.Loyalty.setRules(list);
    window.audit && window.audit.log(isEdit?'loyalty.update':'loyalty.create', obj.name);
    window.toast('✓ Đã lưu rule','success'); window.closeModal(); render();
  };

  window.testLoyalty = function() {
    const total = parseInt(document.getElementById('t_total').value) || 0;
    const grp = document.getElementById('t_grp').value;
    const res = window.Loyalty.applyTo({ total, custGroup:grp, items:[] });
    const out = document.getElementById('t_out');
    if (!res.applied.length) { out.innerHTML = '<div style="color:var(--muted)">Không có rule nào match đơn này.</div>'; return; }
    out.innerHTML = `<b>${res.applied.length} rule áp được:</b><br>` +
      res.applied.map(a => `• ${a.rule}: ${a.freeShip?'<span style="color:#7C3AED">Freeship</span>':`<b style="color:#DC2626">-${window.fmt(a.amount)} ₫</b>`}`).join('<br>') +
      `<hr style="border:none;border-top:1px dashed var(--line);margin:8px 0">` +
      `<div>Tổng giảm: <b style="color:#DC2626">${window.fmt(res.totalDiscount)} ₫</b></div>` +
      `<div>Còn phải trả: <b style="color:var(--ok)">${window.fmt(total - res.totalDiscount)} ₫</b></div>` +
      (res.freeShip ? '<div style="color:#7C3AED">+ Miễn phí vận chuyển</div>' : '');
  };

  render();
})();
</script>
<script src="../scripts/ai-fill.js"></script><script src="../scripts/cust-search-box.js"></script>
<script src="../data/demo-seed.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body></html>
