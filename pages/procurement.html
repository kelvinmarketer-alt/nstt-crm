<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gom hàng → NCC · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .pc-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--line)}
  .pc-tab{padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .pc-tab.active{color:var(--navy);border-bottom-color:var(--navy)}
  .ord-pick{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:#fff;cursor:pointer;transition:border-color .15s}
  .ord-pick:hover{border-color:var(--navy)}
  .ord-pick.sel{border-color:#15803D;background:#F0FDF4}
  .run-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
  .run-card:hover{border-color:var(--navy)}
  .sup-block{border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .sup-block .hd{background:#1B5E20;color:#fff;padding:10px 14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:10px}
  .pc-line{border-bottom:1px solid #EEF2EE;padding:10px 14px}
  .pc-line:last-child{border-bottom:none}
  .bd-chip{display:inline-block;background:#F1F5F9;color:#475569;border-radius:6px;padding:2px 8px;font-size:11.5px;margin:2px 3px 0 0}
  .bd-chip.short{background:#FEE2E2;color:#B91C1C}
  table.pc-mini{width:100%;border-collapse:collapse;font-size:12.5px}
  table.pc-mini th,table.pc-mini td{border:1px solid #E2E8F0;padding:6px 8px}
  table.pc-mini th{background:#F0FDF4;color:#15803D;font-size:11px;text-transform:uppercase}
  table.pc-mini td.num{text-align:right}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div>
    <div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div>
        <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">🧺 Gom hàng → Đặt NCC</h1>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Kho gom sản lượng nhiều đơn → đặt NCC theo từng nhà → xác nhận/báo thiếu → xuất kho cho shipper</div>
      </div>
      <div style="flex:1"></div>
    </div>

    <div class="pc-tabs">
      <div class="pc-tab active" data-pctab="gather" onclick="window.pcSwitch('gather')">① Chọn đơn → Gom</div>
      <div class="pc-tab" data-pctab="runs" onclick="window.pcSwitch('runs')">② Phiên gom &amp; Đặt NCC</div>
      <div class="pc-tab" data-pctab="release" onclick="window.pcSwitch('release')">③ Xuất kho → Ship</div>
    </div>

    <div id="pcGather"></div>
    <div id="pcRuns" style="display:none"></div>
    <div id="pcRelease" style="display:none"></div>
  </main>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" style="width:min(720px,96vw)">
  <div id="drawerContent" style="padding:0"></div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/help-tips.js"></script>
<script src="../scripts/ux-improvements.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script src="../scripts/procurement.js"></script>
<script src="../scripts/data-linkage.js"></script>
<script src="../scripts/system-core.js"></script>
<script src="../scripts/ai-chat.js"></script>
</body>
</html>
