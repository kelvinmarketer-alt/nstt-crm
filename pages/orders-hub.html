<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đơn hàng · Nông Sản Tuấn Tú</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/app.css">
<style>
  .main.hub{display:flex;flex-direction:column;padding:0;overflow:hidden}
  .hub-head{padding:16px 22px 0}
  .tabs2{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-top:10px;flex-wrap:wrap}
  .t2{padding:9px 16px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px}
  .t2.active{color:var(--navy);border-bottom-color:var(--navy)}
  .t2cnt{background:#E2E8F0;color:#475569;border-radius:99px;font-size:11px;font-weight:700;padding:1px 7px}
  .t2.active .t2cnt{background:var(--navy);color:#fff}
  .hub-body{flex:1;position:relative;min-height:0}
  #hubFrame{width:100%;height:100%;border:0;display:block}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"></aside>
  <header class="topbar">
    <div class="breadcrumb"></div>
    <div class="top-spacer"></div>
    <div class="search-global"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Tìm... (Ctrl+K)"></div>
    <button class="icon-btn" title="Thông báo"><span style="font-size:18px">🔔</span><span class="dot"></span></button>
    <button class="icon-btn" title="Hướng dẫn" onclick="window.location.href='docs.html'"><span style="font-size:18px">❓</span></button>
  </header>

  <main class="main hub">
    <div class="hub-head">
      <h1 style="margin:0;font-size:22px;color:var(--navy);font-weight:800">📦 Đơn hàng</h1>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">Đơn thường · đơn từ web · đơn định kỳ · báo giá</div>
      <div class="tabs2">
        <div class="t2 active" data-h="orders" onclick="window.hubTab('orders')">📦 Đơn hàng</div>
        <div class="t2" data-h="web-orders" onclick="window.hubTab('web-orders')">🛒 Đơn từ web <span id="hWeb" class="t2cnt"></span></div>
        <!-- Ẩn theo yêu cầu: Đơn định kỳ
        <div class="t2" data-h="recurring" onclick="window.hubTab('recurring')">🔁 Đơn định kỳ</div> -->
        <div class="t2" data-h="quotes" onclick="window.hubTab('quotes')">📝 Báo giá</div>
      </div>
    </div>
    <div class="hub-body">
      <iframe id="hubFrame" title="Đơn hàng"></iframe>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script src="../scripts/supabase-client.js"></script>
<script src="../scripts/shared.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/auth.js"></script>
<script>if(window.AUTH) window.AUTH.requireAuth();</script>
<script>
  if (window.renderAppShell) window.renderAppShell('orders', 'Đơn hàng');
  window.hubTab = function (which) {
    document.querySelectorAll('.t2').forEach(t => t.classList.toggle('active', t.dataset.h === which));
    document.getElementById('hubFrame').src = which + '.html?embed=1';
  };
  /* badge đơn web */
  (function () {
    function webCnt() {
      if (!window.SB) return;
      window.SB.from('web_orders').select('id', { count: 'exact', head: true }).eq('status', 'pending')
        .then(function (r) { var e = document.getElementById('hWeb'); if (e) e.textContent = r.count || ''; }).catch(function () {});
    }
    webCnt();
    var t = new URLSearchParams(location.search).get('tab') || 'orders';
    window.hubTab(['orders', 'web-orders', 'recurring', 'quotes'].includes(t) ? t : 'orders');
  })();
</script>
</body>
</html>
